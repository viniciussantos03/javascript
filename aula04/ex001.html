<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa</title>
    <style>
        body {
            background-color: lightyellow;
        }

        h1 {
            color: darkblue;
            font-size: 2em;
        }

        p {
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Já me livrei da maldição</p>

    <script>
        window.alert('Olá, Mundo!')
        window.confirm('Você aprende uma linguagem dizendo Olá, Mundo?')
        window.prompt('Qual seu nome?')
    </script>
</body>
</html>
