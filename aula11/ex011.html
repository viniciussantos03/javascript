<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacionalidade</title>
</head>
<body>
    <h1>País em que você nasceu</h1>
    Você nasceu em: <input type="search" name="txtnom" id="txtnom">
    <input type="submit" value="verificar" onclick="nacionalidade()">
    <div id="res">

    </div>
    <script>
        function nacionalidade() {
            var txtn = window.document.getElementById('txtnom')
            var res = window.document.getElementById('res')
            res.innerHTML = `<p>Vivendo em <strong>${txtn.value}</strong> </p>`
            if (txtn.value == 'Brasil') {
                res.innerHTML += '<p>Você é <strong>Brasileiro</strong></p>'
            } else {
                res.innerHTML += '<p>Você é <strong>Estrangeiro</strong></p>'
            }
        }
    </script>
</body>
</html>
